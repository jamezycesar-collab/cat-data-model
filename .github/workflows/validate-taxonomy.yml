# GitHub Actions workflow that runs both taxonomy validators on every PR.

name: Validate taxonomy and check for fabrications

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Validate event taxonomy against spec PDFs
        run: python3 guardrails/validate_event_taxonomy.py --strict
      - name: Check for fabricated event codes
        run: python3 guardrails/validate_no_fabrications.py
      - name: Check Python files parse cleanly
        run: python3 guardrails/validate_python_syntax.py
      - name: Validate field-mapping CSV against verified codes
        run: python3 guardrails/validate_field_specifications.py
      - name: Validate Mermaid diagrams reference real DDL entities
        run: python3 guardrails/validate_diagrams.py
      - name: Validate DDL CHECK constraint values resolve to primary sources
        run: python3 guardrails/validate_check_constraints.py
      - name: Validate cross-dialect column parity
        run: python3 guardrails/validate_cross_dialect_parity.py
